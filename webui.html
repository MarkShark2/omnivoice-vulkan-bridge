<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>OmniVoice WebGPU</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #657181;
      --line: #d8dee8;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --warn: #9a3412;
      --shadow: 0 12px 30px rgba(23, 32, 42, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .model-source {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
    }

    section, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .editor, .controls { padding: 18px; }

    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    textarea, input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    textarea {
      min-height: 330px;
      resize: vertical;
      padding: 13px 14px;
    }

    input[type="text"], input[type="number"] { padding: 10px 11px; }
    input[type="file"] { padding: 9px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .field { margin-bottom: 14px; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button, a.download {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover { background: var(--accent-strong); }

    button.secondary, a.download {
      background: #eef2f7;
      color: var(--ink);
      border-color: var(--line);
    }

    button:disabled, a.download[aria-disabled="true"] {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }

    .status {
      min-height: 42px;
      margin: 0;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .status[data-tone="warn"] { color: var(--warn); }

    audio {
      width: 100%;
      margin-top: 14px;
    }

    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .model-source { text-align: left; }
      .workspace { grid-template-columns: 1fr; }
      textarea { min-height: 250px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>OmniVoice</h1>
      <div class="model-source">MarkShark2/omnivoice-onnx-kv-b1-fp16</div>
    </header>

    <div class="workspace">
      <section class="editor">
        <label for="text">Text</label>
        <textarea id="text" spellcheck="true">OmniVoice is running with WebGPU in this browser.</textarea>
      </section>

      <aside>
        <div class="controls">
          <div class="grid">
            <div class="field">
              <label for="steps">Steps</label>
              <input id="steps" type="number" min="4" max="32" step="1" value="24">
            </div>
            <div class="field">
              <label for="speed">Speed</label>
              <input id="speed" type="number" min="0.5" max="2" step="0.05" value="1.0">
            </div>
            <div class="field">
              <label for="guidance">Guidance</label>
              <input id="guidance" type="number" min="0" max="8" step="0.1" value="2.0">
            </div>
            <div class="field">
              <label for="seed">Seed</label>
              <input id="seed" type="number" step="1" value="42">
            </div>
          </div>

          <div class="field">
            <label for="instruct">Instruction</label>
            <input id="instruct" type="text" placeholder="calm, clear narration">
          </div>

          <div class="field">
            <label for="refAudio">Reference Audio</label>
            <input id="refAudio" type="file" accept="audio/*">
          </div>

          <div class="field">
            <label for="refText">Reference Transcript</label>
            <input id="refText" type="text" placeholder="Optional transcript">
          </div>

          <div class="actions">
            <button id="init" class="secondary" type="button">Load Model</button>
            <button id="synthesize" class="primary" type="button" disabled>Synthesize</button>
            <button id="abort" class="secondary" type="button" disabled>Abort</button>
            <a id="download" class="download" href="#" download="omnivoice.wav" aria-disabled="true">Download WAV</a>
          </div>

          <audio id="audio" controls></audio>
        </div>
        <p id="status" class="status">Ready.</p>
      </aside>
    </div>
  </main>

  <script type="module" src="/tts-engine.js"></script>
  <script type="module">
    const MODEL_BASE_URL = 'https://huggingface.co/MarkShark2/omnivoice-onnx-kv-b1-fp16/resolve/main';

    const els = {
      text: document.getElementById('text'),
      steps: document.getElementById('steps'),
      speed: document.getElementById('speed'),
      guidance: document.getElementById('guidance'),
      seed: document.getElementById('seed'),
      instruct: document.getElementById('instruct'),
      refAudio: document.getElementById('refAudio'),
      refText: document.getElementById('refText'),
      init: document.getElementById('init'),
      synthesize: document.getElementById('synthesize'),
      abort: document.getElementById('abort'),
      download: document.getElementById('download'),
      audio: document.getElementById('audio'),
      status: document.getElementById('status'),
    };

    let initialized = false;
    let currentObjectUrl = null;

    function setStatus(text, tone = '') {
      els.status.textContent = text;
      els.status.dataset.tone = tone;
    }

    async function waitForEngine() {
      for (let i = 0; i < 300; i++) {
        if (window.ttsEngine) return window.ttsEngine;
        await new Promise(resolve => setTimeout(resolve, 50));
      }
      throw new Error('TTS engine module did not load.');
    }

    async function ensureInitialized() {
      if (initialized) return;
      els.init.disabled = true;
      setStatus('Loading model...');
      const engine = await waitForEngine();
      await engine.init(MODEL_BASE_URL);
      initialized = true;
      els.synthesize.disabled = false;
      setStatus('Model ready.');
    }

    async function audioFileToMono24k(file) {
      if (!file) return null;
      const arrayBuffer = await file.arrayBuffer();
      const context = new AudioContext();
      const decoded = await context.decodeAudioData(arrayBuffer.slice(0));
      await context.close();

      const targetRate = 24000;
      const length = Math.max(1, Math.ceil(decoded.duration * targetRate));
      const offline = new OfflineAudioContext(1, length, targetRate);
      const source = offline.createBufferSource();
      source.buffer = decoded;
      source.connect(offline.destination);
      source.start();
      const rendered = await offline.startRendering();
      return rendered.getChannelData(0).slice();
    }

    function wavBlob(floatSamples, sampleRate) {
      const pcm = floatSamples instanceof Float32Array ? floatSamples : new Float32Array(floatSamples);
      const bytesPerSample = 2;
      const dataSize = pcm.length * bytesPerSample;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      function writeString(offset, value) {
        for (let i = 0; i < value.length; i++) view.setUint8(offset + i, value.charCodeAt(i));
      }

      writeString(0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * bytesPerSample, true);
      view.setUint16(32, bytesPerSample, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, dataSize, true);

      let offset = 44;
      for (const sample of pcm) {
        const clamped = Math.max(-1, Math.min(1, sample));
        view.setInt16(offset, clamped < 0 ? clamped * 0x8000 : clamped * 0x7fff, true);
        offset += 2;
      }
      return new Blob([buffer], { type: 'audio/wav' });
    }

    els.init.addEventListener('click', async () => {
      try {
        await ensureInitialized();
      } catch (err) {
        els.init.disabled = false;
        setStatus(err.message, 'warn');
      }
    });

    els.synthesize.addEventListener('click', async () => {
      try {
        await ensureInitialized();
        els.synthesize.disabled = true;
        els.abort.disabled = false;
        setStatus('Preparing request...');

        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
        els.download.href = '#';
        els.download.setAttribute('aria-disabled', 'true');
        els.audio.removeAttribute('src');

        const refAudio = await audioFileToMono24k(els.refAudio.files[0]);
        const result = await window.ttsEngine.synthesize({
          text: els.text.value.trim(),
          refAudio,
          refText: els.refText.value.trim() || null,
          instruct: els.instruct.value.trim() || null,
          numStep: Number(els.steps.value),
          speed: Number(els.speed.value),
          guidanceScale: Number(els.guidance.value),
          tShift: 0.1,
          seed: els.seed.value === '' ? null : Number(els.seed.value),
          denoise: true,
        });

        const blob = wavBlob(result.pcm, result.sampleRate);
        currentObjectUrl = URL.createObjectURL(blob);
        els.audio.src = currentObjectUrl;
        els.download.href = currentObjectUrl;
        els.download.removeAttribute('aria-disabled');
        setStatus(`Generated ${(result.pcmLength / result.sampleRate).toFixed(1)} seconds at ${result.sampleRate} Hz.`);
      } catch (err) {
        setStatus(err.message, 'warn');
      } finally {
        els.synthesize.disabled = !initialized;
        els.abort.disabled = true;
      }
    });

    els.abort.addEventListener('click', () => {
      if (window.ttsEngine) window.ttsEngine.abortGeneration();
      setStatus('Abort requested.');
    });
  </script>
</body>
</html>
